name: Lint (Reusable)

on:
  workflow_call:
    inputs:
      cache-version:
        description: Increment to force cache recreation
        type: number
        default: 1
      container-image:
        description: Docker image to run the job in (e.g. elixir:1.18 or membraneframeworklabs/docker_membrane:latest)
        type: string
        default: membraneframeworklabs/docker_membrane:latest
      install-hex-rebar:
        description: Run mix local.hex and mix local.rebar before mix commands. Required for plain elixir images; not needed for docker_membrane which already includes them.
        type: boolean
        default: false
      credo:
        description: Enable Credo static analysis
        type: boolean
        default: true
      docs:
        description: Check that docs generate without warnings
        type: boolean
        default: true
      dialyzer:
        description: Enable Dialyzer type checking
        type: boolean
        default: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    container:
      image: ${{ inputs.container-image }}
    steps:
      - uses: actions/checkout@v4

      - name: Elixir executor setup
        if: inputs.install-hex-rebar == true
        uses: membraneframework-labs/membrane-actions/actions/elixir-executor-setup@main

      - name: Ensure priv dir exists
        run: mkdir -p priv

      - name: Get mix dependencies
        uses: membraneframework-labs/membrane-actions/actions/get-mix-deps@main
        with:
          cache-version: ${{ inputs.cache-version }}

      - name: Restore build cache
        id: build-cache
        uses: membraneframework-labs/membrane-actions/actions/use-build-cache@main
        with:
          cache-version: ${{ inputs.cache-version }}
          env: dev

      - name: Compile
        run: mix compile

      - name: Save build cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: _build/dev
          key: ${{ steps.build-cache.outputs.cache-key }}

      - name: Check code formatting
        run: mix format --check-formatted

      - name: Run Credo linter
        if: inputs.credo == true
        run: mix credo

      - name: Check docs for warnings
        if: inputs.docs == true
        run: mix docs && mix docs 2>&1 | (! grep -q "warning:")

      - name: Run Dialyzer
        if: inputs.dialyzer == true
        uses: membraneframework-labs/membrane-actions/actions/run-dialyzer@main
        with:
          cache-version: ${{ inputs.cache-version }}
