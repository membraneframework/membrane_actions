name: Test (Reusable)

on:
  workflow_call:
    inputs:
      cache-version:
        description: Increment to force cache recreation
        type: number
        default: 1
      container-image:
        description: Docker image to run the job in (e.g. elixir:1.18 or membraneframeworklabs/docker_membrane:latest)
        type: string
        default: membraneframeworklabs/docker_membrane:latest
      submodules:
        description: Whether to checkout submodules (true, false, or recursive)
        type: string
        default: "false"
      test-flags:
        description: Flags to pass to mix test
        type: string
        default: "--warnings-as-errors"
      force-compile:
        description: Run mix compile --force before tests (useful when deps require a forced recompile)
        type: boolean
        default: false
      shards:
        description: Number of parallel test shards
        type: number
        default: 1
      setup-commands:
        description: Commands to run before checkout
        type: string
        default: ""
        required: false

permissions:
  contents: read

jobs:
  generate_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          echo "matrix=$(python3 -c "import json; print(json.dumps(list(range(1, ${{ inputs.shards }} + 1))))")" >> $GITHUB_OUTPUT

  test:
    needs: generate_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.generate_matrix.outputs.matrix) }}
    env:
      MIX_ENV: test
    container:
      image: ${{ inputs.container-image }}
      env:
        ASDF_DATA_DIR: /root/.asdf
    steps:
      - name: Run setup commands
        if: inputs.setup-commands != ''
        run: ${{ inputs.setup-commands }}

      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}

      - name: Elixir executor setup
        if: startsWith(inputs.container-image, 'elixir')
        uses: membraneframework/membrane_actions/actions/elixir-executor-setup@main

      - name: Ensure priv dir exists
        run: mkdir -p priv

      - name: Get mix dependencies
        uses: membraneframework/membrane_actions/actions/get-mix-deps@main
        with:
          cache-version: ${{ inputs.cache-version }}

      - name: Restore build cache
        uses: membraneframework/membrane_actions/actions/use-build-cache@main
        with:
          cache-version: ${{ inputs.cache-version }}
          env: test

      - name: Compile
        run: |
          if [ "${{ inputs.force-compile }}" = "true" ]; then
            mix compile --force
          else
            mix compile
          fi

      - name: Run tests
        run: |
          if [ "${{ inputs.shards }}" -gt 1 ]; then
            TEST_FILES=$(find test -name "*.exs" | sort | awk "NR % ${{ inputs.shards }} == (${{ matrix.shard }} - 1)")
            mix test ${{ inputs.test-flags }} $TEST_FILES
          else
            mix test ${{ inputs.test-flags }}
          fi
