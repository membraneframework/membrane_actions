name: Hex Publish (Reusable)

on:
  workflow_call:
    inputs:
      cache-version:
        description: Increment to force cache recreation
        type: number
        default: 1
      container-image:
        description: Docker image to run the job in (e.g. elixir:1.18 or membraneframeworklabs/docker_membrane:latest)
        type: string
        default: membraneframeworklabs/docker_membrane:latest
      dry_run:
        description: Build the package with mix hex.build without publishing. Useful for validating the package in CI.
        type: boolean
        default: false
    secrets:
      HEX_API_KEY:
        required: false

jobs:
  hex_publish:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    container:
      image: ${{ inputs.container-image }}
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Elixir executor setup
        if: startsWith(inputs.container-image, 'elixir')
        uses: membraneframework-labs/membrane-actions/actions/elixir-executor-setup@main

      - name: Get mix dependencies
        uses: membraneframework-labs/membrane-actions/actions/get-mix-deps@main
        with:
          cache-version: ${{ inputs.cache-version }}

      - name: Restore build cache
        uses: membraneframework-labs/membrane-actions/actions/use-build-cache@main
        with:
          cache-version: ${{ inputs.cache-version }}
          env: dev

      - name: Ensure priv dir exists
        run: mkdir -p priv

      - name: Build package (dry run)
        if: inputs.dry_run == true
        run: mix hex.build

      - name: Publish to hex.pm
        if: inputs.dry_run == false
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
