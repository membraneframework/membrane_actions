name: Publish Precompiled (Reusable)

on:
  workflow_call:
    inputs:
      version:
        description: GitHub release tag/name to publish to (e.g. v1.2.3)
        type: string
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      WORKSPACE_DIR: ${{ github.workspace }}/workspace
    steps:
      - uses: actions/checkout@v4

      - name: Download all precompiled artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/workspace

      - name: Publish release
        run: bash scripts/publish_precompiled.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
