name: Precompile Linux ARM (Reusable)

on:
  workflow_call:
    inputs:
      package-name:
        description: Name of the Homebrew package to precompile
        type: string
        required: true
      expected-version:
        description: Expected package version (e.g. v1.2.3). Set to 'no check' to skip version validation.
        type: string
        default: 'no check'

permissions:
  contents: read

jobs:
  precompile:
    runs-on: ubuntu-24.04-arm
    env:
      PACKAGE_NAME: ${{ inputs.package-name }}
      EXPECTED_VERSION: ${{ inputs.expected-version }}
      ARCHITECTURE: arm
      WORKSPACE_DIR: ${{ github.workspace }}/workspace
    steps:
      - uses: actions/checkout@v4

      - name: Precompile package for Linux ARM
        run: bash scripts/precompile_for_linux.sh

      - name: Upload Linux ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}_linux_arm
          path: ${{ github.workspace }}/workspace/${{ inputs.package-name }}_linux_arm
