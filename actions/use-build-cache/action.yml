name: Use Build Cache
description: >-
  Restores the _build/<env> directory from cache.
  Exposes cache-key and cache-hit outputs. To save after compilation,
  call actions/cache/save@v4 with path _build/<env> and key from the cache-key output.

inputs:
  cache-version:
    description: Increment to force cache recreation
    required: false
    default: '1'
  env:
    description: Mix environment (dev, test, prod)
    required: false
    default: dev

outputs:
  cache-key:
    description: The cache key to use when saving the build cache
    value: ${{ steps.compute-key.outputs.key }}
  cache-hit:
    description: Whether an exact cache hit occurred
    value: ${{ steps.restore.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Compute cache key
      id: compute-key
      shell: bash
      run: |
        echo "key=v${{ inputs.cache-version }}-build-${{ runner.arch }}-${{ inputs.env }}-${{ hashFiles('mix.lock') }}" >> $GITHUB_OUTPUT

    - name: Restore build cache
      id: restore
      uses: actions/cache/restore@v4
      with:
        path: _build/${{ inputs.env }}
        key: ${{ steps.compute-key.outputs.key }}
