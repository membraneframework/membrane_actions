name: Use Build Cache
description: >-
  Restores and saves the _build/<env> directory using actions/cache.
  The cache is saved automatically at the end of the job as a post-step.

inputs:
  cache-version:
    description: Increment to force cache recreation
    required: false
    default: '1'
  env:
    description: Mix environment (dev, test, prod)
    required: false
    default: dev

outputs:
  cache-hit:
    description: Whether an exact cache hit occurred
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Restore and save build cache
      id: cache
      uses: actions/cache@v4
      with:
        path: _build/${{ inputs.env }}
        key: v${{ inputs.cache-version }}-build-${{ runner.arch }}-${{ inputs.env }}-${{ hashFiles('mix.lock') }}
