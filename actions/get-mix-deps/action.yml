name: Get Mix Dependencies
description: Gets mix dependencies, using a cache keyed on mix.lock.

inputs:
  cache-version:
    description: Increment to force cache recreation
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - name: Write asdf tool versions for GitHub Actions HOME
      shell: bash
      run: |
        if [ -n "${ASDF_DATA_DIR}" ] && [ -d "${ASDF_DATA_DIR}/installs" ]; then
          for tool_dir in "${ASDF_DATA_DIR}/installs"/*/; do
            tool=$(basename "${tool_dir}")
            version=$(ls "${tool_dir}" 2>/dev/null | sort -V | tail -1)
            [ -n "$version" ] && echo "${tool} ${version}" >> "${HOME}/.tool-versions"
          done
        fi

    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: v${{ inputs.cache-version }}-mix-deps-${{ hashFiles('mix.lock') }}
        restore-keys: |
          v${{ inputs.cache-version }}-mix-deps-

    - name: Get dependencies
      shell: bash
      run: mix deps.get
